<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Puzzle Game</title>

<style>

*{
box-sizing:border-box;
}

body{
font-family: "Segoe UI", Arial, sans-serif;
text-align:center;
margin:0;
min-height:100vh;
background:linear-gradient(135deg,#1f2937,#111827,#020617);
color:white;
}

h1{
margin-top:15px;
font-size:42px;
letter-spacing:2px;
}

#menu{
width:720px;
margin:40px auto;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.choice{
width:160px;
height:160px;
background-size:cover;
background-position:center;
border-radius:14px;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
transition:0.35s;
}

.choice:hover{
transform:scale(1.08) rotate(1deg);
box-shadow:0 15px 35px rgba(0,0,0,0.7),0 0 15px #22c55e;
}

#game{
display:none;
}

#puzzle{
width:320px;
height:320px;
margin:40px auto;
position:relative;
border-radius:16px;
border:4px solid #22c55e;
box-shadow:0 10px 40px rgba(0,0,0,0.8);
overflow:hidden;
}

.tile{
width:106.666px;
height:106.666px;
position:absolute;
background-size:320px 320px;
cursor:pointer;
border:1px solid rgba(255,255,255,0.2);
transition:left 0.25s ease, top 0.25s ease, transform 0.15s;
}

.tile:hover{
transform:scale(1.05);
}

button{
padding:12px 22px;
font-size:16px;
border:none;
margin:10px;
border-radius:8px;
color:white;
cursor:pointer;
background:linear-gradient(45deg,#22c55e,#16a34a);
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

#popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

#popup div{
background:white;
padding:30px;
border-radius:10px;
text-align:center;
width:350px;
color:black;
}

</style>
</head>

<body>

<h1>🧩 HELLO MAAM JAY</h1>
<h3>Select an Image</h3>

<div id="menu"></div>

<div id="game">
<div id="puzzle"></div>

<button onclick="shuffle()">Shuffle</button>
<button onclick="backMenu()">Change Image</button>
</div>

<h3>PLEASE SOLVE THE IMAGE TO UNLOCK SECRET MODE</h3>

<div id="popup">
<div>

<h2>🎉 Well Done!</h2>
<p style="color:red;"><b>Before proceeding please turn on your audio.</b></p>

<button onclick="proceedToVideo()">Proceed</button>

</div>
</div>

<script>

const menu = document.getElementById("menu");
const puzzle = document.getElementById("puzzle");
const game = document.getElementById("game");

let currentImage = "";
let tiles = [];
let isShuffling = false;

let positions = [0,1,2,3,4,5,6,7,null];

const puzzles = [
{img:"images/img1.jpg", video:"videos/vid1.mp4"},
{img:"images/img2.png", video:"videos/vid2.mp4"},
{img:"images/img3.png", video:"videos/vid3.mp4"},
{img:"images/img4.jpg", video:"videos/vid4.mp4"},
{img:"images/img5.png", video:"videos/vid5.mp4"},
{img:"images/img6.jpg", video:"videos/vid6.mp4"},
{img:"images/img7.jpg", video:"videos/vid7.mp4"},
{img:"images/img8.jpg", video:"videos/vid8.mp4"}
];

puzzles.forEach((item)=>{

const img = document.createElement("div");
img.className="choice";
img.style.backgroundImage=`url(${item.img})`;

img.onclick=()=>startGame(item);

menu.appendChild(img);

});

let currentPuzzle = null;

function startGame(puzzleData){

currentPuzzle = puzzleData;
currentImage = puzzleData.img;

menu.style.display="none";
game.style.display="block";

puzzle.innerHTML="";
tiles=[];

positions=[0,1,2,3,4,5,6,7,null];

createTiles();
render();
shuffle();

}

function createTiles(){

for(let i=0;i<8;i++){

const tile=document.createElement("div");

tile.className="tile";
tile.dataset.index=i;

tile.style.backgroundImage=`url(${currentImage})`;

let size = 320/3;

let x = (i % 3) * size;
let y = Math.floor(i / 3) * size;

tile.style.backgroundPosition = `-${x}px -${y}px`;

tile.onclick=()=>move(i);

puzzle.appendChild(tile);
tiles.push(tile);

}

}

function render(){

tiles.forEach((tile,i)=>{

const pos=positions.indexOf(i);

let size = 320/3;

let x = (pos % 3) * size;
let y = Math.floor(pos / 3) * size;

tile.style.left=x+"px";
tile.style.top=y+"px";

});

}

function move(tileIndex){

const tilePos=positions.indexOf(tileIndex);
const emptyPos=positions.indexOf(null);

const valid=[tilePos-1,tilePos+1,tilePos-3,tilePos+3];

if(valid.includes(emptyPos)){

positions[emptyPos]=tileIndex;
positions[tilePos]=null;

render();
checkWin();

}

}

function shuffle(){

isShuffling = true;

for(let i=0;i<200;i++){

const empty=positions.indexOf(null);

const neighbors=[
empty-1,
empty+1,
empty-3,
empty+3
];

const movable=[];

neighbors.forEach(n=>{
if(n>=0 && n<9 && positions[n]!==undefined){
movable.push(positions[n]);
}
});

const rand=movable[Math.floor(Math.random()*movable.length)];

move(rand);

}

isShuffling = false;

}


function backMenu(){

game.style.display="none";
menu.style.display="grid";

}

function checkWin(){

if(isShuffling) return;

const solved=[0,1,2,3,4,5,6,7,null];

if(JSON.stringify(positions)===JSON.stringify(solved)){

document.getElementById("popup").style.display="flex";

}

}

function proceedToVideo(){

document.getElementById("popup").style.display="none";

/* redirect to video page */
window.location.href="video.html?video="+encodeURIComponent(currentPuzzle.video);

}

</script>

</body>
</html>
